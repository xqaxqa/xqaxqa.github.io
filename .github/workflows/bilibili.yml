name: Bilibili Live Status

on:
  schedule:
    - cron: '*/15 * * * *'  # 每15分钟运行一次
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Fetch Bilibili Live Status
        run: |
          ROOM_ID="23199566"
          API_URL="https://api.live.bilibili.com/xlive/web-room/v1/index/getInfoByRoom?room_id=${ROOM_ID}"
          
          # 获取直播状态
          RESPONSE=$(curl -s "$API_URL")
          IS_LIVE=$(echo "$RESPONSE" | jq -r '.data.room_info.live_status // "0"')
          TITLE=$(echo "$RESPONSE" | jq -r '.data.room_info.title // ""')
          UNAME=$(echo "$RESPONSE" | jq -r '.data.anchor_info.base_info.uname // "逆取"')
          ONLINE=$(echo "$RESPONSE" | jq -r '.data.room_info.online // "0"')
          COVER=$(echo "$RESPONSE" | jq -r '.data.room_info.cover // ""')
          
          # 读取当前 bilibili.json
          CURRENT_JSON=$(cat bilibili.json)
          CURRENT_IS_LIVE=$(echo "$CURRENT_JSON" | jq -r '.isLive')
          
          # 转换 boolean
          if [ "$IS_LIVE" = "1" ]; then
            IS_LIVE_BOOL="true"
          else
            IS_LIVE_BOOL="false"
          fi
          
          # 检测状态变化，记录时间戳
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          if [ "$IS_LIVE_BOOL" = "true" ] && [ "$CURRENT_IS_LIVE" = "false" ]; then
            # 刚开播：记录开播时间，清空下播时间
            jq --arg ts "$TIMESTAMP" '.isLive = true | .streamStartTime = $ts | .streamEndTime = "" | .lastUpdate = $ts' bilibili.json > tmp.json && mv tmp.json bilibili.json
          elif [ "$IS_LIVE_BOOL" = "false" ] && [ "$CURRENT_IS_LIVE" = "true" ]; then
            # 刚下播：记录下播时间，保留开播时间
            jq --arg ts "$TIMESTAMP" '.isLive = false | .streamEndTime = $ts | .lastUpdate = $ts' bilibili.json > tmp.json && mv tmp.json bilibili.json
          else
            # 状态未变化：只更新 lastUpdate
            jq --arg ts "$TIMESTAMP" '.lastUpdate = $ts' bilibili.json > tmp.json && mv tmp.json bilibili.json
          fi
          
          # 更新其他字段
          jq --arg title "$TITLE" --arg uname "$UNAME" --argjson online "$ONLINE" --arg cover "$COVER" \
            '.title = $title | .uname = $uname | .online = $online | .system_cover = $cover' \
            bilibili.json > tmp.json && mv tmp.json bilibili.json
          
          echo "Updated bilibili.json: isLive=${IS_LIVE_BOOL}"
          cat bilibili.json
      
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bilibili.json
          git commit -m "📡 update: Bilibili live status" || echo "No changes to commit"
          git push
